<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disk Analyzer</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="split-layout">
    <!-- Left Pane: Tree View -->
    <div class="pane tree-pane">
      <div class="pane-header">
        <h2>File System</h2>
        <button id="btn-select-folder" class="btn small">Open Folder</button>
      </div>
      <div id="tree-container" class="tree-container">
        <p class="placeholder-text">Select a folder to begin analyzing your storage.</p>
      </div>
    </div>

    <!-- Right Pane: Inspector -->
    <div class="pane inspector-pane">
      <div class="pane-header">
        <h2>Inspector</h2>
      </div>
      <div class="inspector-content">
        <div id="inspector-placeholder" class="inspector-placeholder">
          <div class="status-icon">🔎</div>
          <p>Select a folder from the tree to view its details.</p>
        </div>
        
        <div id="inspector-details" class="inspector-details hidden">
          <div class="info-group">
            <label>Name</label>
            <h3 id="inspect-name">Folder Name</h3>
          </div>
          
          <div class="info-group">
            <label>Path</label>
            <p id="inspect-path" class="path-text">C:\Path\To\Folder</p>
          </div>

          <div class="info-stats">
            <div class="stat-box">
              <label>Total Size</label>
              <div id="inspect-size" class="stat-val">0 B</div>
            </div>
            <div class="stat-box">
              <label>Type</label>
              <div id="inspect-type" class="stat-val">Directory</div>
            </div>
          </div>
          
          <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p id="danger-desc">Select a permanent action for this item.</p>
            <div class="danger-actions">
              <button id="btn-empty" class="btn hidden danger-outline full">Empty Contents Only</button>
              <button id="btn-delete" class="btn danger full">Permanently Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
