<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disk Cleaner Pro</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <div class="glass-panel">
      
      <div class="header">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
        <h1>Disk Cleaner Pro</h1>
      </div>
      
      <div class="status-container">
        <div id="status-icon" class="status-icon idle">🔍</div>
        <p id="status-message" class="status-message">Ready to scan your entire system for junk.</p>
        <p id="size-display" class="size-display hidden">0 B</p>
      </div>

      <div id="category-list" class="category-list hidden">
        <!-- Categories injected here by JS -->
      </div>

      <div class="actions">
        <button id="btn-scan" class="btn primary">Scan System</button>
        <button id="btn-clean" class="btn hidden danger" disabled>Clean Selected Items</button>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
